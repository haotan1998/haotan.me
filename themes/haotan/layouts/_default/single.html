{{ define "main" }}
<article class="blog-post">
    <div class="container blog-post__container">
        <header class="blog-post__header">
            <a href="{{ .Parent.Permalink }}" class="blog-post__back">← Back</a>
            <time class="blog-post__date" datetime="{{ .Date.Format " 2006-01-02" }}">{{ .Date.Format "January 2, 2006"
                }}</time>
            <h1 class="blog-post__title">{{ .Title }}</h1>
            {{ with .Description }}<p class="blog-post__desc">{{ . }}</p>{{ end }}
        </header>
        <div class="blog-post__content prose">
            {{ .Content }}
        </div>
        <footer class="blog-post__footer">
            <a href="{{ .Parent.Permalink }}" class="btn btn--outline-dark">← All Posts</a>
        </footer>
    </div>
</article>
{{ end }}
