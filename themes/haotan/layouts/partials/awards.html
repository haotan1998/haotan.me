<section class="section awards" id="awards">
    <div class="container">
        <div class="section__header">
            <span class="section__number">05</span>
            <h2 class="section__title">Honours &amp; Awards</h2>
        </div>
        <div class="timeline">
            {{ range .Site.Data.awards }}
            <div class="timeline__item">
                <div class="timeline__marker"></div>
                <div class="timeline__content">
                    <span class="timeline__date">{{ .year }}</span>
                    <h3 class="timeline__heading">{{ .title }}</h3>
                    {{ with .venue }}<p class="timeline__sub">{{ . }}</p>{{ end }}
                </div>
            </div>
            {{ end }}
        </div>
    </div>
</section>
