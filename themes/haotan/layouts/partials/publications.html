<section class="section publications" id="publications">
    <div class="container">
        <div class="section__header">
            <span class="section__number">04</span>
            <h2 class="section__title">Publications &amp; Patents</h2>
        </div>

        {{ range .Site.Data.publications }}
        <div class="pub-group">
            <h3 class="pub-group__title">{{ .group }}</h3>

            {{ range .entries }}
            <article class="pub">
                <div class="pub__accent"></div>
                <div class="pub__body">
                    <h4 class="pub__title">{{ .title }}</h4>
                    <p class="pub__authors">{{ .authors | safeHTML }}</p>
                    <p class="pub__venue">{{ .venue | safeHTML }}</p>
                    {{ with .badge }}<span class="pub__badge">{{ . }}</span>{{ end }}
                    {{ with .links }}
                    <div class="pub__links">
                        {{ range . }}
                        <a href="{{ .url }}" target="_blank" rel="noopener">{{ .label }}</a>
                        {{ end }}
                    </div>
                    {{ end }}
                </div>
            </article>
            {{ end }}
        </div>
        {{ end }}
    </div>
</section>
