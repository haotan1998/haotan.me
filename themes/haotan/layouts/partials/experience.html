<section class="section experience" id="experience">
    <div class="container">
        <div class="section__header">
            <span class="section__number">03</span>
            <h2 class="section__title">Experience</h2>
        </div>
        <div class="timeline">
            {{ range .Site.Data.experience }}
            <div class="timeline__item">
                <div class="timeline__marker"></div>
                <div class="timeline__content">
                    <span class="timeline__date">{{ .date }}</span>
                    <h3 class="timeline__heading">{{ .title }}</h3>
                    <p class="timeline__sub">
                        {{ with .orgUrl }}<a href="{{ . }}" target="_blank" rel="noopener">{{ end }}
                            {{ .organization }}
                        {{ with .orgUrl }}</a>{{ end }}
                    </p>
                    {{ with .description }}
                    <p class="timeline__desc">{{ . }}</p>
                    {{ end }}
                </div>
            </div>
            {{ end }}
        </div>
    </div>
</section>
